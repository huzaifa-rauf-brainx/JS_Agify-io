<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="assets/JavaScript/script.js"></script>
    <title>Age Prediction</title>
</head>

<body>
    <div class="d-flex justify-content-center">
        <div class="col-11 col-md-6 d-flex flex-column">
            <h1 class="text-center text-primary mt-5">Estimate the Age of a Name</h1>
            <div class="mb-3">
                <label for="nameInput" class="form-label">First Name</label>
                <input type="text" class="form-control" id="nameInput" placeholder="Enter your first name">
            </div>
            <div class="mb-3">
                <label for="countryCode" class="form-label">Country Code</label>
                <input type="text" class="form-control" id="countryCode" placeholder="Enter your country code">
            </div>
            <div>
                <button class="btn btn-primary" id="checkBtn">Predict Age</button>
            </div>
            <div id="toast" class="alert d-none mt-3" role="alert"></div>
        </div>
    </div>
</body>

</html>
