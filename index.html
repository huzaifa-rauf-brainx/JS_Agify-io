<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <script src="assets/JavaScript/script.js" defer></script>
    <title>Age Prediction</title>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <form id="ageForm" class="col-11 col-md-6 d-flex flex-column mt-5" novalidate>
            <h1 class="text-center text-primary mb-4">Estimate the Age of a Name</h1>
            <div class="mb-3">
                <label for="nameInput" class="form-label">First Name</label>
                <input type="text" class="form-control" id="nameInput" name="name" placeholder="Enter your first name"
                    required aria-label="First name input">
            </div>
            <div class="mb-3">
                <label for="countryCode" class="form-label">Country Code</label>
                <input type="text" class="form-control" id="countryCode" name="country"
                    placeholder="Enter your 2-letter country code" required pattern="[A-Z]{2}"
                    aria-label="Country code input">
            </div>
            <div class="mb-3">
                <button type="submit" class="btn btn-primary" id="checkBtn">Predict Age</button>
            </div>
            <div id="loading" class="text-center text-muted d-none">Loading...</div>
            <div id="toast" class="alert d-none mt-3" role="alert"></div>
        </form>
    </div>
</body>
</html>
